version: '3.8'

services:
  todo-app:
    build: .
    container_name: todo-app-production
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"\]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
